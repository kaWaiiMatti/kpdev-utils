name: Build and push kpdev-ado-agent container image

on:
  push:
    branches:
      - main
    tags:
      - 'kpdev-ado-agent-v*'
    paths:
      - kpdev-ado-agent/start.sh
      - kpdev-ado-agent/Dockerfile
env:
  IMAGE_NAME: kpdev-ado-agent
jobs:
  push:
    runs-on: ubuntu-24.04-arm
    permissions:
      packages: write
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
      - name: Build image
        run: docker build kpdev-ado-agent/ --file kpdev-ado-agent/Dockerfile --tag $IMAGE_NAME --label "runnumber=${GITHUB_RUN_ID}"
      - name: Log in to registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Push image
        run: |
          IMAGE_ID=ghcr.io/${{ github.repository_owner }}/$IMAGE_NAME
          # This changes all uppercase characters to lowercase.
          IMAGE_ID=$(echo $IMAGE_ID | tr '[A-Z]' '[a-z]')
          # This strips the git ref prefix from the version.
          VERSION=$(echo "${{ github.ref }}" | sed -e 's,.*/\(.*\),\1,')
          # Strip the 'kpdev-ado-agent-' prefix if present (for tags like kpdev-ado-agent-v1.2.3)
          VERSION=$(echo "$VERSION" | sed -e 's/^kpdev-ado-agent-//')
          # This strips the "v" prefix from the tag name.
          [[ "${{ github.ref }}" == "refs/tags/"* ]] && VERSION=$(echo $VERSION | sed -e 's/^v//')
          # This uses the Docker `latest` tag convention.
          [ "$VERSION" == "main" ] && VERSION=latest
          echo IMAGE_ID=$IMAGE_ID
          echo VERSION=$VERSION
          docker tag $IMAGE_NAME $IMAGE_ID:$VERSION
          docker push $IMAGE_ID:$VERSION
